# GAS から起動: 下取りメールの短縮URL(base64)を受け取り、追跡番号を抽出してスプシへ反映
name: Resolve tracking URL

on:
  workflow_dispatch:
    inputs:
      trade_in_id:
        description: '下取りID（必須）'
        required: true
      short_url_b64:
        description: '短縮URLのbase64（必須）'
        required: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode short URL
        id: geturl
        env:
          SHORT_URL_B64: ${{ github.event.inputs.short_url_b64 }}
        run: |
          short_url=$(python3 -c "import base64, os; print(base64.b64decode(os.environ['SHORT_URL_B64']).decode('utf-8'), end='')")
          if [ -z "$short_url" ]; then
            echo "::error::short_url_b64 のデコードに失敗しました"
            exit 1
          fi
          echo "short_url<<EOF" >> $GITHUB_OUTPUT
          echo "$short_url" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tracking-resolver/package-lock.json

      - name: Install dependencies
        run: |
          cd tracking-resolver
          npm ci

      - name: Install Playwright browsers
        run: |
          cd tracking-resolver
          npx playwright install chromium --with-deps

      - name: Resolve URL and extract tracking number
        id: resolve
        env:
          SHORT_URL: ${{ steps.geturl.outputs.short_url }}
          TRADE_IN_ID: ${{ github.event.inputs.trade_in_id }}
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
        run: |
          cd tracking-resolver
          node resolve.js

      - name: Output result
        run: |
          echo "追跡番号: ${{ steps.resolve.outputs.tracking_number }}"
          echo "下取りID: ${{ steps.resolve.outputs.trade_in_id }}"
