# GAS から起動: trade_in_id のみ（URLは GAS の getPending で取得）
# 手動で長いURLを貼る場合は resolve-tracking-manual.yml を使う
name: Resolve tracking URL

on:
  workflow_dispatch:
    inputs:
      trade_in_id:
        description: '下取りID（必須）'
        required: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get short URL from GAS
        id: geturl
        env:
          GAS_BASE: ${{ secrets.GAS_WEB_APP_URL }}
          TRADE_IN_ID: ${{ github.event.inputs.trade_in_id }}
        run: |
          base="${GAS_BASE%%\?*}"
          url="${base}?action=getPending&tradeInId=${TRADE_IN_ID}"
          # -L: GAS のリダイレクト追従。応答がHTMLのときは jq が壊れるので Python で JSON のみパース
          resp=$(curl -sSL "$url" || true)
          short_url=$(printf '%s' "$resp" | python3 -c "
          import json, sys
          raw = sys.stdin.read().strip().lstrip('\ufeff')
          if not raw.startswith('{'):
              sys.stderr.write('GASの応答がJSONではありません（Webアプリを「全員」にし、URLが /exec か確認）。先頭300文字:\n')
              sys.stderr.write(raw[:300] + '\n')
              sys.exit(1)
          try:
              d = json.loads(raw)
              u = d.get('shortUrl') or ''
              print(u, end='')
          except json.JSONDecodeError as e:
              sys.stderr.write('JSONパース失敗: ' + str(e) + '\n')
              sys.stderr.write(raw[:400] + '\n')
              sys.exit(1)
          ")
          if [ -z "$short_url" ]; then
            echo "::error::shortUrl が空です。GAS で trigger 前に PENDING が保存されているか確認してください。"
            exit 1
          fi
          echo "short_url<<EOF" >> $GITHUB_OUTPUT
          echo "$short_url" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tracking-resolver/package-lock.json

      - name: Install dependencies
        run: |
          cd tracking-resolver
          npm ci

      - name: Install Playwright browsers
        run: |
          cd tracking-resolver
          npx playwright install chromium --with-deps

      - name: Resolve URL and extract tracking number
        id: resolve
        env:
          SHORT_URL: ${{ steps.geturl.outputs.short_url }}
          TRADE_IN_ID: ${{ github.event.inputs.trade_in_id }}
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
        run: |
          cd tracking-resolver
          node resolve.js

      - name: Output result
        run: |
          echo "追跡番号: ${{ steps.resolve.outputs.tracking_number }}"
          echo "下取りID: ${{ steps.resolve.outputs.trade_in_id }}"
