# 手動テスト用: 長い c.gle URL をそのまま貼る（内部で base64 化して安全に渡す）
name: Resolve tracking URL (manual URL)

on:
  workflow_dispatch:
    inputs:
      trade_in_id:
        description: '下取りID（必須）'
        required: true
      short_url:
        description: '短縮URL（c.gle を全文貼り付け）'
        required: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Pass URL to next step
        id: geturl
        env:
          INPUT_URL: ${{ github.event.inputs.short_url }}
        run: |
          short_url_b64=$(python3 -c "import base64, os; print(base64.b64encode(os.environ['INPUT_URL'].encode('utf-8')).decode('ascii'), end='')")
          echo "short_url_b64=$short_url_b64" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tracking-resolver/package-lock.json

      - name: Install dependencies
        run: |
          cd tracking-resolver
          npm ci

      - name: Install Playwright browsers
        run: |
          cd tracking-resolver
          npx playwright install chromium --with-deps

      - name: Resolve URL and extract tracking number
        id: resolve
        env:
          SHORT_URL_B64: ${{ steps.geturl.outputs.short_url_b64 }}
          TRADE_IN_ID: ${{ github.event.inputs.trade_in_id }}
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
        run: |
          cd tracking-resolver
          export SHORT_URL=$(python3 -c "import base64, os; print(base64.b64decode(os.environ['SHORT_URL_B64']).decode('utf-8'), end='')")
          node resolve.js

      - name: Output result
        run: |
          echo "追跡番号: ${{ steps.resolve.outputs.tracking_number }}"
          echo "下取りID: ${{ steps.resolve.outputs.trade_in_id }}"
