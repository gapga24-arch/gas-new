# 手動テスト用: 長い c.gle URL をそのまま貼る（GAS の getPending は使わない）
name: Resolve tracking URL (manual URL)

on:
  workflow_dispatch:
    inputs:
      trade_in_id:
        description: '下取りID（必須）'
        required: true
      short_url:
        description: '短縮URL（c.gle を全文貼り付け）'
        required: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pass URL to next step
        id: geturl
        env:
          INPUT_URL: ${{ github.event.inputs.short_url }}
        run: |
          echo "short_url<<EOF" >> $GITHUB_OUTPUT
          echo "$INPUT_URL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tracking-resolver/package-lock.json

      - name: Install dependencies
        run: |
          cd tracking-resolver
          npm ci

      - name: Install Playwright browsers
        run: |
          cd tracking-resolver
          npx playwright install chromium --with-deps

      - name: Resolve URL and extract tracking number
        id: resolve
        env:
          SHORT_URL: ${{ steps.geturl.outputs.short_url }}
          TRADE_IN_ID: ${{ github.event.inputs.trade_in_id }}
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
        run: |
          cd tracking-resolver
          node resolve.js

      - name: Output result
        run: |
          echo "追跡番号: ${{ steps.resolve.outputs.tracking_number }}"
          echo "下取りID: ${{ steps.resolve.outputs.trade_in_id }}"
